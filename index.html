<body>
    <!-- Skip Link for Accessibility -->
    <a href="#main-content" class="skip-link">Langsung ke konten utama</a>

    <!-- Header -->
    <header class="header" role="banner">
        <div class="logo">KapanLibur</div>
        <div class="controls" role="group" aria-label="Pengaturan tampilan">
            <button id="langToggle" class="control-btn" aria-label="Ganti bahasa antara Bahasa Indonesia dan Inggris" aria-pressed="false">
                <span id="langText">EN</span>
            </button>
            <button id="themeToggle" class="control-btn" aria-label="Ganti tema terang atau gelap" aria-pressed="false">
                <i id="sunIcon" class='bx bx-sun' style="display: none;" aria-hidden="true"></i>
                <i id="moonIcon" class='bx bx-moon' aria-hidden="true"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main id="main-content" class="main-container" role="main">
        <!-- Hero Section -->
        <section class="hero stagger-1" aria-labelledby="today-label">
            <p class="hero-label" id="todayLabel">Hari Ini</p>
            <h1 class="hero-title" id="currentEvent">Memuat...</h1>
            <p class="hero-date" id="currentDate"></p>
        </section>

        <!-- Next Holiday -->
        <section class="stagger-2" aria-labelledby="upcoming-label">
            <p class="section-title" id="upcomingLabel">Libur Yang Akan Datang</p>
            <div class="next-holiday-card" id="nextHolidayCard" role="region" aria-live="polite">
                <div class="next-holiday-info">
                    <h2 id="upcomingEventName">Memuat...</h2>
                    <p class="next-holiday-date" id="upcomingEventDate"></p>
                </div>
                <div class="countdown-wrapper" role="timer" aria-live="off" aria-label="Hitung mundur ke hari libur">
                    <div class="countdown-item">
                        <span class="countdown-value" id="countDays" aria-label="hari">0</span>
                        <span class="countdown-label" id="labelDays">Hari</span>
                    </div>
                    <div class="countdown-item">
                        <span class="countdown-value" id="countHours" aria-label="jam">0</span>
                        <span class="countdown-label" id="labelHours">Jam</span>
                    </div>
                    <div class="countdown-item">
                        <span class="countdown-value" id="countMinutes" aria-label="menit">0</span>
                        <span class="countdown-label" id="labelMinutes">Menit</span>
                    </div>
                    <div class="countdown-item">
                        <span class="countdown-value" id="countSeconds" aria-label="detik">0</span>
                        <span class="countdown-label" id="labelSeconds">Detik</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Leave Suggestions -->
        <section class="stagger-3" aria-labelledby="suggestions-label">
            <p class="section-title" id="suggestionsLabel">Saran Cuti</p>
            <div class="suggestions-grid" id="suggestionsList" role="list" aria-live="polite">
                <!-- Loading state -->
                <div class="empty-state" role="status">
                    <div class="spinner" aria-label="Memuat data"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer" role="contentinfo">
        <p>KapanLibur — <span id="footerText">Dibuat dengan ☕ oleh</span> <a href="https://kriscode.space/" target="_blank" rel="noopener noreferrer">Kristoff</a></p>
    </footer>

    <script src="assets/app.js"></script>
</body>

</html>
